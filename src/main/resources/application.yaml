server:
  port: 8080
spring:
  application:
    name: cheonil-restaurant-spring
  datasource:
    url: jdbc:postgresql://localhost:5432/cheonil
    username: root
    password: root1!
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway 가 스키마 관리 — Hibernate 는 검증만 (drop/alter 금지).
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 기존 운영 DB (스키마 이미 있음, 데이터 있음) 안전 도입:
    #  - 첫 실행 시 flyway_schema_history 가 없으면 baseline-version 으로 마킹만 하고 V1 은 skip
    #  - 그 다음부터 V2, V3 ... 만 적용
    # 새 환경 (빈 DB) 에서는 baseline-on-migrate 와 무관하게 V1 부터 모두 실행.
    baseline-on-migrate: true
    baseline-version: 1
    # ⚠️ 운영 전환 시 반드시 제거 (또는 true) — checksum 검증 안전망.
    # 개발 단계 한정: 적용된 V2 (seed) 를 자유롭게 누적 편집할 수 있도록 임시로 끔.
    # 운영 들어가면: 모든 변경은 V3, V4 ... 신규 migration 으로만 추가.
    validate-on-migrate: false
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha