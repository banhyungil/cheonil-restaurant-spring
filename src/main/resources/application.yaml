server:
  port: 8080
spring:
  application:
    name: cheonil-restaurant-spring
  datasource:
    url: jdbc:postgresql://localhost:5432/cheonil
    username: root
    password: root1!
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway 가 스키마 관리 — Hibernate 는 검증만 (drop/alter 금지).
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 기존 운영 DB (스키마 이미 있음, 데이터 있음) 안전 도입:
    #  - 첫 실행 시 flyway_schema_history 가 없으면 baseline-version 으로 마킹만 하고 V1 은 skip
    #  - 그 다음부터 V2, V3 ... 만 적용
    # 새 환경 (빈 DB) 에서는 baseline-on-migrate 와 무관하게 V1 부터 모두 실행.
    baseline-on-migrate: true
    baseline-version: 1
    # ⚠️ 운영 전환 시 반드시 제거 (또는 true) — checksum 검증 안전망.
    # 개발 단계 한정: 적용된 V2 (seed) 를 자유롭게 누적 편집할 수 있도록 임시로 끔.
    # 운영 들어가면: 모든 변경은 V3, V4 ... 신규 migration 으로만 추가.
    validate-on-migrate: false
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha

# 자체 호스팅 Whisper STT 서비스 base URL — docker compose 에선 service name `whisper`.
# 환경변수 + fallback
# 환경변수가 없는경우 localhost 주소사용 -> 개발시에도 동작
whisper:
  url: ${WHISPER_URL:http://localhost:9000}

# Google Cloud APIs — TTS + STT 통합. API key 는 .env 의 GOOGLE_API_KEY.
# 콘솔에서 키별 사용 한도(quota)를 cap 해두면 초과 시 자동으로 429 반환 → 앱은 메시지만.
google:
  api-key: ${GOOGLE_API_KEY:}
  tts:
    voice: ${GOOGLE_TTS_VOICE:ko-KR-Chirp3-HD-Achernar}
    language-code: ${GOOGLE_TTS_LANGUAGE_CODE:ko-KR}
  stt:
    language-code: ${GOOGLE_STT_LANGUAGE_CODE:ko-KR}
    # 인식 모델 — latest_short(Chirp 단문, 주문 적합), latest_long(긴 발화), default(범용),
    # command_and_search(짧은 쿼리). 매장 주문은 단문이라 latest_short.
    model: ${GOOGLE_STT_MODEL:latest_short}

# TTS mp3 디스크 캐시 — 동일 (text, speed, gainDb, voice) 재요청 시 즉시 응답.
# dir 미지정 시 `${java.io.tmpdir}/tts-cache` 사용 → 재기동 시 자연 초기화.
tts:
  cache:
    dir: ${TTS_CACHE_DIR:${java.io.tmpdir}/tts-cache}
    max-size-mb: 200

