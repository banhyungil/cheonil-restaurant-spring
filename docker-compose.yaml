# =====================================================================
# Local / dev compose stack — PostgreSQL + Spring app.
#
# 사용:
#   docker compose up -d             # PG + app 빌드 + 백그라운드 기동
#   docker compose logs -f app       # 앱 로그
#   docker compose down              # 컨테이너 정지 (data volume 보존)
#   docker compose down -v           # data volume 까지 삭제 (DB 초기화)
# =====================================================================

services:
  db:
    image: postgres:17
    container_name: cheonil-db
    restart: always
    volumes:
      - v-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root1!
      POSTGRES_DB: cheonil
    healthcheck:
      # app 컨테이너가 PG ready 까지 대기 — depends_on.condition: service_healthy 와 결합
      test: ["CMD-SHELL", "pg_isready -U root -d cheonil"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cheonil

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # image: banhyungil/cheonil-restaurant-spring
    container_name: cheonil-server
    restart: always
    ports:
      - "8080:8080"
    environment:
      # application.yaml 의 spring.datasource.* 를 환경변수로 override.
      # 컨테이너 간 통신은 service 이름(db) 을 hostname 으로 사용.
      TZ: Asia/Seoul # 추가
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cheonil
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1!
      WHISPER_URL: http://whisper:9000
      GOOGLE_TTS_API_KEY: ${GOOGLE_TTS_API_KEY}
    volumes:
      # claude CLI 인증/세션을 named volume 으로 영속화.
      # 컨테이너 재시작/재빌드 시에도 login 상태 유지. 최초 1회는
      # `docker compose exec app claude /login` 로 device flow 로 인증 진행.
      - v-claude:/root/.claude
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cheonil
  # Cloudflare Tunnel — 매장 PC 의 Spring 을 outbound 터널로 외부 노출.
  # `api.cheonil.org` → Cloudflare Edge → 본 컨테이너 → app:8080.
  # 토큰은 Cloudflare Zero Trust > Networks > Connectors 에서 발급한 후 .env 에 저장.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cheonil-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - app
    networks:
      - cheonil

  # 자체 호스팅 STT — faster-whisper (small 모델, CPU 최적화).
  # 첫 실행 시 모델 다운로드 (~600MB) — volume 으로 영속화.
  # API: POST /asr (multipart audio_file) → { text, language, ... }
  # @SEE https://github.com/openai/whisper
  # @SEE https://hub.docker.com/r/onerahmet/openai-whisper-asr-webservice
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: cheonil-whisper
    restart: always
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: small
      ASR_ENGINE: faster_whisper
      ASR_MODEL_PATH: /data/whisper-models
    volumes:
      - v-whisper-models:/data/whisper-models
    networks:
      - cheonil

  web:
    container_name: cheonil-web
    build:
      context: ../cheonil-restaurant-next
      dockerfile: Dockerfile
    # image: banhyungil/cheonil-restaurant-next
    restart: always
    ports:
      - 80:80
    environment:
      API_BACKEND_URL: http://app:8080
    depends_on:
      - app
    networks:
      - cheonil

networks:
  cheonil:
    name: cheonil
    driver: bridge

volumes:
  v-db:
  v-whisper-models:
  v-claude:
